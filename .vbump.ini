[current_version]
major = 1
minor = 1
patch = 1
devtext = -dev.
devnumber = 4

[syntax]
write_dev = {major}.{minor}.{patch}{devtext}{devnumber}
write_prod = {major}.{minor}.{patch}
read_regex = (?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)((?P<devtext>.*)(?P<devnumber>\d+))?

[bump]
reset_order = major, minor, patch, devnumber
auto = devnumber

[write]
files = _version.py
